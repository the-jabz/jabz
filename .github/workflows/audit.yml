name: Dependency Audit

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ---------- Frontend ----------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: npm audit
        working-directory: frontend
        run: npm audit --audit-level=high

      # ---------- Backend ----------
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run cargo audit (docker)
        run: |
          docker run --rm \
            -v $PWD:/app \
            -w /app \
            rustsec/cargo-audit cargo audit

      - name: cargo audit
        working-directory: backend
        run: cargo audit

      # ---------- Docker ----------
      - name: Build frontend Docker image
        run: docker build -t frontend:ci ./frontend

      - name: Install Trivy
        run: |
          sudo apt-get install -y wget
          wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.49.1_Linux-64bit.deb
          sudo dpkg -i trivy_0.49.1_Linux-64bit.deb

      - name: Scan frontend Docker image
        run: trivy image frontend:ci --severity HIGH,CRITICAL --exit-code 1
