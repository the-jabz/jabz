name: Dependency Audit

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      # ---------- Frontend ----------
      frontend-audit:
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v4
          - name: Setup Node
            uses: actions/setup-node@v4
            with:
              node-version: 24
              cahce: 'npm'
              cache-dependency-path: 'frontend/package-lock.json'

          - name: Install frontend deps
            working-directory: frontend
            run: npm ci

          - name: npm audit
            working-directory: frontend
            run: npm audit --audit-level=high

      # ---------- Backend ----------
      backend-audit:
        runs-on: ubuntu-latest
        steps:
        - uses: actions/checkout@v4

        - name: Setup Rust
          uses: dtolnay/rust-toolchain@stable
    
        - name: Cache cargo registry
          uses: Swatinem/rust-cache@v2
          with:
            workspaces: backend

        - name: Install cargo-audit
          run: |
            curl -L -f --proto '=https' --tlsv1.2 \
              https://github.com/RustSec/rustsec/releases/download/v0.18.1/cargo-audit-x86_64-unknown-linux-gnu.tar.gz \
              -o cargo-audit.tar.gz
            tar xzf cargo-audit.tar.gz
            sudo mv cargo-audit /usr/local/bin/

        - name: cargo audit
          working-directory: backend
          run: cargo audit

      # ---------- Docker ----------
      docker-scan:
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v4

          - name: Setup Node
            uses: actions/setup-node@v4
            with:
              node-version: 24
              cache: 'npm'
              cache-dependency-path: 'frontend/package-lock.json'

          - name: Install frontend deps
            working-directory: frontend
            run: npm ci

          - name: Build frontend Docker image
            run: docker build -t frontend:ci ./frontend

          - name: Install Trivy
            run: |
              sudo apt-get install -y wget
              wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.49.1_Linux-64bit.deb
              sudo dpkg -i trivy_0.49.1_Linux-64bit.deb

          - name: Scan frontend Docker image
            run: trivy image frontend:ci --severity HIGH,CRITICAL --exit-code 1
