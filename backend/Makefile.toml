[tasks.lint]
description = "Run Rust linter (clippy)"
command = "cargo"
args = ["clippy", "--all-targets", "--all-features", "--", "-D", "warnings"]

[tasks.lint-toml]
description = "Lint TOML files"
command = "cargo"
args = ["install", "taplo-cli", "--locked"]
dependencies = []

[tasks.lint-toml-check]
description = "Check TOML files formatting"
command = "taplo"
args = ["fmt", "--check", "Cargo.toml", "../Makefile.toml"]
dependencies = ["lint-toml"]

[tasks.lint-all]
description = "Run all linters (Rust + TOML)"
dependencies = ["lint", "lint-toml-check"]
